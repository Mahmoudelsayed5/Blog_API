version: "3.9"

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: sayed
      POSTGRES_PASSWORD: sayed
      POSTGRES_DB: blog_api_development
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && rails server -b 0.0.0.0"
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://sayed:sayed@db:5432/blog_api_development
      REDIS_URL: redis://redis:6379/1

  sidekiq:
    build: .
    command: bundle exec sidekiq
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://sayed:sayed@db:5432/blog_api_development
      REDIS_URL: redis://redis:6379/1

volumes:
  db_data:
